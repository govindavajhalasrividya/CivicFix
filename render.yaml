/*
  Render Blueprint — deploys both backend (Web Service) and frontend (Static Site)
  from the same GitHub repo.
  Docs: https://render.com/docs/blueprint-spec
*/
services:
  # ── Backend: Node.js / Express API ──────────────────────────────────────────
  - type: web
    name: civicfix-api
    runtime: node
    rootDir: civicfix-platform/backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: ADMIN_EMAIL
        value: admin@civicfix.com
      - key: ADMIN_PASSWORD
        sync: false          # set manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false          # set to your frontend Render URL after deploy

  # ── Frontend: React / Vite Static Site ──────────────────────────────────────
  - type: web
    name: civicfix-frontend
    runtime: static
    rootDir: civicfix-platform/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # set to your backend Render URL after deploy
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
